# ref: <https://yazi-rs.github.io/docs/configuration/yazi>

[mgr]
linemode = "mtime"

[[opener.code]]
run = 'code "$@"'
orphan = true
desc = "code"
for = "unix"

[[opener.extract]]
run = 'ouch decompress "$@"'
desc = "Extract"
for = "unix"

[[opener.open]]
run = 'xdg-open "$@" &> /dev/null'
orphan = true
desc = "Open"
for = "linux"

[[opener.view]]
run = '${VIEWER:-bat} "$@"'
block = true
desc = "$VIEWER"
for = "unix"

[[open.prepend_rules]]
mime = "model/*"
use = ["open", "reveal"]

[[open.prepend_rules]]
mime = "text/*"
use = ["code", "edit", "open", "reveal", "view"]

# ref: <https://yazi-rs.github.io/docs/tips/#folder-previewer>
[[plugin.prepend_previewers]]
url = "**/mnt/**"
run = "noop"

[[plugin.prepend_preloaders]]
url = "**/mnt/**"
run = "noop"

# ref: <https://github.com/yazi-rs/plugins/tree/main/git.yazi>
[[plugin.prepend_fetchers]]
url = "*"
run = "git"
group = "git"

[[plugin.prepend_fetchers]]
url = "*/"
run = "git"
group = "git"

# ref: <https://github.com/yazi-rs/plugins/tree/main/mime-ext.yazi>
[[plugin.prepend_fetchers]]
url = "**/mnt/**"
run = "mime-ext.remote"
prio = "high"
group = "mime"

[[plugin.prepend_fetchers]]
url = "*"
run = "mime-ext.local"
prio = "high"
group = "mime"
