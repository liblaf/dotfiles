# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-go/master/schema/compose-spec.json

name: Caddy

services:
  caddy:
    cap_add:
      - NET_ADMIN
    container_name: caddy
    env_file:
      - ./vars.env
    image: caddybuilds/caddy-cloudflare:alpine@sha256:bb84fb9062a5b9266c2f8ea81f367b2e189d60157a61904282f50870b40f2529
    network_mode: host
    pull_policy: weekly
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-config:/config
      - caddy-data:/data

volumes:
  caddy-config:
  caddy-data:
