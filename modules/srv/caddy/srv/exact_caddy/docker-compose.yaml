# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-go/master/schema/compose-spec.json

name: Caddy

services:
  caddy:
    cap_add:
      - NET_ADMIN
    container_name: caddy
    env_file:
      - ./vars.env
    image: caddybuilds/caddy-cloudflare:alpine@sha256:cf5b5948e1717212841ffba76d91aae1bb1ee448ed7288fd6c4e9d24b02d634e
    network_mode: host
    pull_policy: weekly
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-config:/config
      - caddy-data:/data

volumes:
  caddy-config:
  caddy-data:
